<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GahCo.Beauty Studio - Formulário</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<style>
  body {
    font-family: 'Jost', sans-serif;
    background-color: #ffe6f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }

  /* overlay de carregamento */
  #loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.35);
    z-index: 9999;
    align-items: center;
    justify-content: center;
  }

  /* card branco com spinner e texto */
  #loading-overlay .card {
    background: #fff;
    padding: 18px 20px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
    text-align: center;
    min-width: 220px;
  }

  /* spinner simples */
  .spinner {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 4px solid rgba(0, 0, 0, 0.12);
    border-top-color: #e91e63;
    animation: spin 1s linear infinite;
    margin: 0 auto 10px auto;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  /* mensagem menor */
  #loading-overlay p {
    margin: 0;
    font-size: 14px;
    color: #333;
  }

  .container {
    margin: 0 auto;
    max-width: 500px;
    background: #fff;
    padding: 30px 25px;
    border-radius: 20px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    position: relative;
    /* padrão, mas garante que não seja empurrado */
  }



  /* === Fade-in suave na logo === */
  .logo-wrapper {
    width: 100%;
    max-width: 400px;
    height: 120px;
    /* altura fixa para não empurrar o container */
    border-radius: 20px;
    /* cantos arredondados */
    overflow: hidden;
    /* garante que a borda seja aplicada */
    margin-bottom: 15px;
  }

  img.logo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* preenche todo o wrapper mantendo proporção */
    opacity: 0;
    transition: opacity 1s ease-in-out;
    display: block;
  }

  img.logo.visible {
    opacity: 1;
  }

  h2 {
    color: #e91e63;
    font-size: 18px;
    margin-bottom: 20px;
    text-align: center;
  }

  input,
  textarea,
  select {
    padding: 12px 15px;
    margin: 0 0 15px 0;
    width: 100%;
    border: 1px solid #f5b6cc;
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    box-sizing: border-box;

  }

  #lbl-termo {
    display: block;
    margin-top: 10px;
    font-weight: 600;
    color: #e91e63;
    text-align: center;
  }


  /* textarea autoFit já tinha padding, mas podemos reforçar para consistência */
  textarea.autoFit {
    padding: 12px 15px;
    width: 100%;
    overflow: hidden;
    resize: none !important;
    box-sizing: border-box;
    line-height: 1.5;
    font-family: inherit;
    border: 1px solid #f5b6cc;
    border-radius: 10px;
    background: #fff;
  }

  .btn {
    background: #e91e63;
    border: 2px solid #ec105d;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 16px;
    color: #ffffff;
    font-family: 'Jost', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
    margin-top: 12px;
  }

  .btn:hover {
    transform: scale(1.03);
  }

  .btn-submit:hover {
    transform: scale(1.03);
  }

  .hidden {
    display: none;
  }

  footer {
    text-align: center;
    font-size: 13px;
    color: #555;
    margin-top: 25px;
  }

  .language-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
  }

  .lang-btn {
    background: #fdf1f7;
    border: 2px solid #f5b6cc;
    border-radius: 12px;
    padding: 12px 20px;
    font-size: 16px;
    color: #555;
    font-family: 'Jost', sans-serif;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .lang-btn:hover {
    background: #fce4ec;
    border-color: #e91e63;
    color: #e91e63;
    transform: scale(1.03);
  }

  .lang-btn.active {
    background: #e91e63;
    color: white;
    border-color: #e91e63;
    transform: scale(1.05);
  }

  .checkbox-line {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-top: 20px;
    font-family: 'Jost', sans-serif;
    font-size: 15px;
    color: #444;
    line-height: 1.5;
    width: 100%;
    text-align: left;
  }

  .checkbox-line input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: #e91e63;
    margin-left: 20px;
    margin-top: 1px;
    flex-shrink: 0;
  }

  .checkbox-line span {
    flex: 1;
    text-align: left;
    margin-right: 10px;
  }

  @media (max-width: 480px) {
    .container {
      padding: 25px 18px;
    }

    h2 {
      font-size: 16px;
    }

    .btn,
    .lang-btn {
      font-size: 15px;
    }
  }
</style>

    function showLoading(lang) {
      const loadingOverlay = document.getElementById("loading-overlay");
      const loadingText = document.getElementById("loading-text");

      let message = lang === "pt" ? "Enviando o formulário..." :
        lang === "en" ? "Sending the form..." :
          "Enviando el formulario...";

      loadingOverlay.style.display = "flex";

    function hideLoading() {
      document.getElementById("loading-overlay").style.display = "none";
    }

    /* === Timeout fetch helper === */
    function fetchWithTimeout(resource, options = {}, timeout = 12000) {
      return Promise.race([
        fetch(resource, options),
        new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), timeout))
      ]);
    }

    /* === Envio do formulário com spinner + timeout (Opção A) === */
    document.getElementById("consent-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      showLoading(selectedLang);

      const alergicoVal = document.getElementById("alergia").value;
      let alergiasVal;

      if (alergicoVal === "Sim" || alergicoVal === "Sim" || alergicoVal === "Sim") {
        alergiasVal = document.getElementById("qual").value.trim() || (selectedLang === 'pt' ? "Não informado" : selectedLang === 'en' ? "Não informado" : "Não informado");
      } else {
        alergiasVal = selectedLang === 'pt' ? "Nenhuma" : selectedLang === 'en' ? "Nenhuma" : "Nenhuma";
      }

      const data = {
        nome: document.getElementById("nome").value.trim(),
        data: document.getElementById("data").value,
        horario: document.getElementById("hora").value,
        alergico: alergicoVal,
        alergias: alergiasVal,
        aceito: document.getElementById("aceito").checked ? "Sim" : "Não",
        servico: servicoSelecionado,
        lang: selectedLang,
      };

      try {
        const response = await fetch("/api/sendForm", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        const result = await response.json();
        hideLoading();

        if (result.result === "success") {
          document.getElementById("consent-form").classList.add("hidden");
          document.getElementById("confirmation-page").classList.remove("hidden");
        } else {
          alert(selectedLang === "pt" ? "Ocorreu um erro ao enviar o formulário. Tente novamente." :
            selectedLang === "en" ? "Error sending the form. Please try again." :
              "Ocurrió un error al enviar el formulario. Intente nuevamente.");
        }
      } catch (error) {
        hideLoading();
        alert(selectedLang === "pt" ? "Ocorreu um erro ao enviar o formulário. Tente novamente." :
          selectedLang === "en" ? "Error sending the form. Please try again." :
            "Ocurrió un error al enviar el formulario. Intente nuevamente.");
      }
    });


    /* === Auto-resize para textareas === */
    function autoResizeTextarea(textarea) {
      textarea.style.height = "auto"; // Reseta a altura
      textarea.style.height = textarea.scrollHeight + "px"; // Define o tamanho exato do texto interno
    }

    document.querySelectorAll("textarea").forEach(textarea => {
      // Ajusta ao carregar
      autoResizeTextarea(textarea);
      // Ajusta sempre que o conteúdo mudar
      textarea.addEventListener("input", () => autoResizeTextarea(textarea));
    });

    // Aplica automaticamente uppercase a todos os inputs de texto
    document.querySelectorAll('input[type="text"], input[type="email"], input[type="tel"], textarea').forEach(input => {
